<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Simulator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">
<div class="top-bar">
<h1>Dice Simulator</h1>
<button id="toggleBtn">🌙</button>
</div>

<!-- Mode Select -->
<select id="mode">
<option value="1">1 Dice</option>
<option value="2">2 Dice</option>
</select>

<!-- Guess Mode -->
<input type="number" id="guess" placeholder="Guess (1-6 or 2-12)">
<div class="dice-area">
<div class="dice" id="dice1">🎲</div>
<div class="dice" id="dice2" style="display:none;">🎲</div>
</div>
<button id="rollBtn">Roll Dice</button>
<p id="result"></p>
</div>
<script src="script.js"></script>
</body>
</html>
